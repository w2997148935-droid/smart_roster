{% extends "base.html" %}
{% block content %}
<h2>管理员控制台</h2>

<div class="row mt-4">
    <!-- 导入功能 -->
    <div class="col-md-6">
        <div class="card">
            <div class="card-header">1. 导入员工名单 (Excel)</div>
            <div class="card-body">
                <form action="/admin/import" method="POST" enctype="multipart/form-data">
                    <div class="mb-3">
                        <label>上传Excel文件 (列: 姓名, 账号, 密码, 组别)</label>
                        <input type="file" name="file" class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn-primary">导入</button>
                </form>
            </div>
        </div>
    </div>
    
    <!-- 生成排班 -->
    <div class="col-md-6">
        <div class="card">
            <div class="card-header">2. 智能生成排班</div>
            <div class="card-body">
                <form action="/admin/generate" method="POST">
                    <div class="mb-3">
                        <label>日期</label>
                        <input type="date" name="date" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label>时间段 (1-6)</label>
                        <select name="slot" class="form-control">
                            {% for i in range(1, 7) %}<option value="{{ i }}">{{ i }}</option>{% endfor %}
                        </select>
                    </div>
                    <button type="submit" class="btn btn-success">生成该时段排班</button>
                </form>
            </div>
        </div>
    </div>
</div>

<h4 class="mt-4">员工管理</h4>
<table class="table table-striped">
    <thead><tr><th>账号</th><th>姓名</th><th>组别</th><th>累积值班</th><th>操作</th></tr></thead>
    <tbody>
    {% for u in users %}
        <tr>
            <td>{{ u.username }}</td>
            <td>{{ u.name }}</td>
            <td>{{ u.group }}</td>
            <td>{{ u.count }}</td>
            <td>
                <a href="/admin/delete/{{ u.id }}" class="btn btn-sm btn-danger" onclick="return confirm('确定删除?')">删除</a>
            </td>
        </tr>
    {% endfor %}
    </tbody>
</table>
{% endblock %}
