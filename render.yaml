services:
  - type: web
    name: smart-roster-system
    env: python
    region: singapore
    plan: free
    runtime:
      image: public.ecr.aws/render/cpython:3.11
    buildCommand: "pip install --upgrade pip setuptools wheel && pip install -r requirements.txt"
    startCommand: "gunicorn app:app"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: roster-db
          property: connectionString

databases:
  - name: roster-db
    databaseName: rosterdb
    user: rosteruser
    plan: free