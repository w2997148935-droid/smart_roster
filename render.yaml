services:
  - type: web
    name: smart-roster
    # 关键修复：使用 docker 环境代替 python 环境，以强制指定镜像
    env: docker
    dockerfilePath: ./Dockerfile
    region: singapore
    plan: free
    buildCommand: "pip install --upgrade pip setuptools wheel && pip install -r requirements.txt"
    startCommand: "gunicorn app:app"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: roster-db
          property: connectionString

databases:
  - name: roster-db
    databaseName: rosterdb
    user: rosteruser
    plan: free
